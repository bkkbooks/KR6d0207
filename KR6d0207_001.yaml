body:
  text: 隋天台智者大師説祖習觀行凡有三通明禪一則次第二非次第三赴緣不定或次不次若次者初從安般數息欲界未到四禪四無量四空六妙門十六特勝通明九想十想八念八背捨勝處一切處變化六通九定奮迅超越等行行諸禪次從五停心四諦十六行生諸品道無漏根十智等行慧諸禪乃至於佛三十四心樹下跏趺斷惑成聖齊方便教中為鈍根弟子漸次明禪從淺至深一一分別不相混濫不可以念處之名安無學之後不得將四空在數息之前便乖經論不成次第故次依案綸緒而辨名相故言次第禪也非次第者即是利根頓悟大乘之人如華嚴可集八禪之衆明九種大禪自性一切門善人一切行除惱他世樂清淨等禪直觀諸法實相離名絶相亡去心法四句撿洗體達虗妄始自菩薩藏聞思前行終于大菩提果雖有九禪之差悉是約理研心無復事中階梯如前之次故名非次也已現止觀云云無方赴機明禪者即是非次第非不次第也自有一種機緣亦非方便漸次之根亦非頓悟之性不可定作次第之説亦不可定作非次第説則應以無方不定赴此機緣此緣不定不可一準故言非次第非不次第也此三直與常途所明頓漸偏方不定名字乃同而對當無方之意與常異也若以此三意對諸教者三藏教毗曇成實所説者即是次第意也華嚴地論所明集八禪衆明該六十億菩薩得住無垢地所辨四十二賢聖所修禪定之相此即非次第意也若如諸大乘經中有無方不定者即如三論正意也欲學問人多以智慧推撿作三教名説今約心入道作三禪名説兩意載在餘文今正明次第禪門淺深之相故言次第法門也故大品云次第行學道即此義也問應説波若何故説此次第禪門耶答為顯波若故如波若明真空為顯波若故亦明其餘次第諸法空何故爾今若不遍淺深次第之門後修般若般若空未發其餘空預前證謬謂為是今明次第分別異相為顯般若也又所以爾者為既辨諸法故若修無漏時有漏不求而自發預不先知謂言非法謂乖波若則生棄想若一向取復混魔事若丕取復乖波若故須分別又赴物機緣故若有大機但聞波若即會深理若無大機必憑屋入理故説次第也又衆生喜樂不同故以欲拘牽後令入佛道復次説次第者為知波若生處故若修般若時會須一法門為方便為生般若處隨得一法調心則堪修習般若般若得生也所以明次第者若直修空於五度成外道空食鹽太過若但五度五度無用成凡夫法今正道修空明般若以五度調心方入般若又説此次第者嚴飾般若故復次説次第者為益般若故如薪多火猛般若無名法破諸法故名般若若不識諸法則無所破成般若少若意識廣破如火益薪也又説次第者為明助道故如得初禪已離五蓋乃至非想離粗惑斷得般若斷十細煩惱則易如羅漢先除三界惑後得般若斷習入大乘又直般若斷惑乾燥故得助道資成為易又説次第者為學無所畏故直學波若是自行化他則闕學次第則隨問能答衆生信伏後示真道又説次第者菩薩欲度衆生衆生機病無量須遍學諸法知病識藥故又説次第者為通諸經論故若有事相不通理亦成壅復次所以明次第門者為明中道故若直明空非是正觀中道中道者智者見空及與不空尚不住空豈住不空不住二邊雙照二邊方是正道又説次第者還反質問者為當離次第説非次第為即次第説耶若離次而説非次亦應離色別説於空若色即是空空不離色今即次第是非次第非是離次第而條然有非次第説非次第不可得故故經云修色無常已不可得故乃至識亦如是修次第不可得即是非次第也釋十科意者初五是解心希向欲求定意未是修行之法後五是自解而起行內外方便方正是進行若無解不得立行解是行本故請觀音云大智本行又云非智不禪智即是解禪即是行若是事中散心布施等行力用微少若制心禪寂發得六通能雨大千世界珍寶遍十方界已施衆生當知修禪是大道行也生起十意次第如文中云云第五得心法者若是學義者名為境智今禪門注名名為心法第六方便一重者方便名善巧於內外方便將進得所巧用四悉檀調心然後能發諸禪定故言方便向下自廣明之十重明義止齊第六第七明修證修名習行證名發得此一科大有所開具若修證方法始論阿鼻地獄上至四念處又從四念處對阿羅漢行行慧行等又從菩薩藏聞思前行自性禪及諸地修證等種種不同修相各各異證相各各異一一精細使因果分明始終可見義廣今不復論問阿鼻是惡趣云何辨修答通稱為修真偽多種行者為破三寶故而悟禪此則是修阿鼻禪問禪是棄惡其既惡心那忽得禪舊解云此人遮重根利雖發心時惡若攝心入禪根利故故能發禪今解不爾禪有多種九十六種道隨與相應即得邪禪鬼定此案是邪見之通得與其修相應云云如調達修禪即是阿鼻禪也歷根本特勝通明行行慧行等修相各各不同邪正亦異乃至菩薩藏諸地修證各有相貌具有釋當有十卷文云云第八顯示果報者果報與修證若為異修是修習名因證是尅獲名果此果是習果得報之時名為報果從阿鼻去乃至於佛皆須一一顯示果報若是二乘明但有習果無有報果灰身滅智無受生處故若大乘所明此人受法性身亦有報果若是明菩薩者三賢十聖住果報何容不得辨果報佛亦得言報涅槃云願得無上報又云因滅是色獲得常色亦得明報也辨此亦有數卷第九從禪起教此有亦行因得果自行具足復須化他昔久住生死遍學諸禪若次若非次皆悉究了知病識藥隨其所宜而為設教若設人天教多從通明禪中起何以故此禪深觀五藏即能了達五行上當五星下當五嶽陰陽八卦五常天文地理醫方笇計軍兵技術曆數禮樂皆依五行八卦如此諸事悉在通明禪中而得明了故知起人天乘從此禪出也若修禪時尸羅不清淨三昧不現前要須持戒乃得諸禪發禪之時又發得定共戒約此而起戒藏又四禪即是定約此起定藏修禪時觀四念處修生法二空觀慧成就方能見理發得無漏故約此起慧藏觀空有二種一拆空二體空約折空起三藏教之慧藏約體空起通教之慧藏禪中者觀諸法雖空一心具萬行假名分別約此起於名相即別教也若禪中能觀中道性空真理即約此起圓頓之教又法性即是佛性約此而起涅槃之教大經涅槃者名深禪定窟也禪觀於法性法性能運出二種生死若觀實相理即是性淨我若觀智圓明即圓淨我若觀方便權巧即方便權巧即方便乘約此起教即法華會三歸一無上之大乘也又修禪時觀法性空故即是一切智觀假名道故即道種智觀空假不二即中道一切種智約此起教即是般若也又禪中觀法或可依次第觀或時依不次第觀若化他時約此赴緣無方縱任即是方等維摩之屬何以故淨名彈斥俗道無方轉變不唯一種故又方等中或大小相並並對而説更相形斥即是此意也故知諸教皆約禪而起故云諸佛轉法轉輪入涅槃皆在四禪中約禪起教何教不攝如是等約作遍起諸教相此自可知凡有兩卷明此義云云第十結會旨歸者上九意明禪自凡至聖論次甚多束其旨趣但是一心故釋論云一切諸法中但有名與色若欲如實觀但當觀名色也色從心生但觀心性名為上定故知研心心收萬法如得珠玉衆寶皆獲如牽衣一角諸處皆動故條流萬緒歸海而會禪相不一篤論但心觀此心性即實相理是故歸宗結要唯在於此也如是十科前五重分別衆緣家所尚明顯同異故第六七二科是降心家急要即自行用不受學者不可為説也此如戒心不可妄授下去修證非初學所得説之無妨如律家五名小戒得聽云云釋第一大段明大意中簡非者凡有十種備如止觀中説今略明一兩如者如為求安樂故修禪此屬六欲天心作意防持離惡修善希於安樂名屬人道心是故受報假緣方得若任運心成不須防護何以故得禪味故任運怡悅或三五日入禪不起設起出觀任運有樂若發心求此名為天心後受天報自然而至不勞運役故此心名為天心也取譬如乾牛皮雖強卷舒不隨處分喻如作意如牛腦皮牽觸軟善喻如入禪雖復出定猶有滋味所修戒施不同散心云云又直求勢力是魔心如魔著於果報見人出境即來遮壞如今時人既有大力受果報故有人違之即能損他也又樂諸見者是外道心欲因禪發慧毀他顯己如經中説梨耆彌因緣云云所以禪靜能發邪正二慧本時邪獲取理今以靜心瑩之邪慧即發便成邪見本時心正用定調之便發正慧正慧不須簡邪心修禪是故須簡也又若人俗有求樂欣勢樂見三心者逐其強弱以判其因若雖求樂樂勢力強屬魔心若但樂樂帶少淨心是梵民心若樂樂又慈人及物即梵王心若樂諸見即屬外道此三心相添隨強判因云云又直就外道心自判三種一直修邪二帶事兼人三具上二傍通名字發邪慧時成三種外道一一切智二得神通三韋陀總上二也通名前三種天心亦是外道樂勢力是神通樂諸見是一切智帶淨心兼人是韋陀通別邪僻用心皆是不正也是故非乘中翻邪歸正對破三外道悟因時即是三種念處獲果即是三種解脫破邪顯正云云但一往判十心為因何必全爾如墮地獄自有多種不止一途今舉強者以為義端耳乃至二乘入理亦多種法門略舉數修以示其語行其諸故決墮其中也若次第簡非者初止簡三途之非不簡人天若進明二乘者但非九心若大乘即非二邊十種俱非也若作不次第簡非者更於菩薩心中復分別具在止觀今約次第故則十修簡非也問發此心即成業為當證禪遂其所求方成業耶答小乘動七支成業發心未是業大乘明一念起惡殃墜無間不得遂與不遂發即是業也問此應有輕重答若止發心是不定業若事成是定業問若修禪要壞欲界或發初禪禪定成方生上界若起惡念念破三寶其事未成那得墮地獄答為惡若崩故起惡即成業為善若作發禪方生又地獄是同界發心即墮色界是異界須發禪乃生今簡十種偽心不同成業不成業此心即名為非若不識者相續不斷即結業成牽生故須棄捨問十非與法界而同異答十界則凡聖俱開十心則開凡合聖為明縛脫二邊之非也第二顯是者是名為正明修禪大意即是發菩提心心有四種一緣於正因緣生滅法發心二者緣真空理發心三緣俗諦假名發心四緣中道法界發心若是前來諸非多是緣無因緣邪因緣自善因緣自度因緣非正因緣無大慈悲不能為物故非菩提心菩薩見衆生起十種邪無等因緣為此而起大悲良由衆生不識正因緣故而起九種邪惡邪惡即是集集招苦果菩薩為欲此衆生苦習故而起大悲興兩誓願衆生無邊誓願度是苦故起煩惱無量誓願斷是集故發又以衆生苦集故則無道滅出世因果欲與其道滅故而起大慈興兩誓願法門無量誓願知是與道無上佛道誓願成是與滅是為緣正因緣興起誓願發菩提心發心既正則行願不偏是名緣正因緣發心修禪也次緣真淨空理發心者只是緣向來正因緣觀此即空衆生顛倒謂言不空以不知空故而起十種邪僻之有有即是集集故招苦為此而起大悲興兩誓願也此之苦集即體是空故大品云即色是空空即是色色空空色無二無別是名為中道中論云能説是因緣善滅諸戲論滅有二種一善滅二不善滅不善滅即是析法觀空滅色故空善滅即是體達即色是空非色滅空是為善滅也欲與衆生如此道滅而起大慈興兩誓願既識正因緣即空故發心行願皆緣於真是為緣真淨發菩提心也次緣俗諦發心者假名差別有無量相而衆生不識妄生分別起邪起惡二乘但空心所不到以空為證菩薩於此而起大悲興於誓願云云又緣中道發菩提心者此心亦名中道實理心第一義空菴摩羅識佛性如如實際實相無住無生等種種異名如天帝釋多諸名字而皆離縛脫世出世有漏無漏有為無為等種種二邊故非生死非涅槃有為無為等遮此二邊名為中即虗亡寂絶無所依猗待邊明中中不可得絶名為中能如是者通取無上正真之理目之為道此理非因非果非初非後非發非不發非道非不道淨若虗空而赴物逗緣説於因果道心等所以者何衆生心性明智如日故曰覆之暗如漆以初發心却除二邊之僻顯出中道之理名之為因究竟此理名之為果通達此理名之為道故上普賢觀云大乘因者諸法實相大乘果者亦諸法實相然此正觀之心不可破壞不動不退名為實相大論云不動不退是心名薩埵若不得此心入諸禪中皆不名波羅蜜若以此心入次第諸禪皆名波羅蜜入二乘凡夫等法皆名摩訶衍故大品云次第心中云衆生波若云何應修應行佛言心心諸數不行故名行波若名生名修此即是無生無行無修之修行也此心若發任運與無緣慈悲俱生為衆生説此依猗法令免二邊繫縛之苦名為無緣大悲與衆生實相不動之樂名為大慈故思益云一切衆生無中計有無我計我凡三十二種菩薩為此而起大悲又大經云一切諸法中悉有安樂性當知實相之理任運與慈悲俱生也何但具此慈悲亦具一切故云諸法雖空一心具萬行但衆生得樂之時非是如來將樂授彼彼自有之如貧女金為其耘掘拔苦與樂其義亦然又自得樂是自生如來與是他生四句破云云無此四性而説自樂云云又前三種發菩提心今稱三種四諦三波羅蜜三因三果三種誓願而不名為弘今中道之心緣無作四諦該括四弘而起誓願得稱弘誓願也問何故非弘以不稱理故悉是緣衆生緣法而起慈悲耶答如女人諂曲故故不稱為弘誓也若中道之慈此慈稱理不名為諂如大愛道經女人而無諂也實相之慈慈即如來譬如慈石吸鐵離石無吸離吸無石即吸是石如即慈是如來故名弘誓也又如中論云若計諸法定性性名定實實有不可改變如是則無四淨四行賢聖道果三寶出世因果亦無世間罪福一切世法也若計諸法定空墮斷滅中亦無世間出世賢聖因果等法但有虗妄顛倒流轉以自毀傷若能作中道正觀體達無性深識苦集能治之觀即是道滅是則三寶四諦八法寂然皆無毀損故云不壞假名而説諸法實相是名緣中道發菩提心也料簡法門無盡誓願知者門名能通通即是道無上佛道誓願成此云何異答法門橫辨佛道竪論問涅槃亦名道實相亦名道實相大道佛從來故般若亦名道此三云何答若三德而論法身亦非波若亦非解脫亦非並別一異皆非三法具足名祕密藏那可偏論今若別論法身當體從法身起行行即波若波若名為道通至涅槃今取竪所至處名涅槃是無上道度所得處即是般若名為法門云云問中道實相非佛天人修羅所作云何言發答雖非諸作而隱名藏顯名身能作如上體達待隱不發稱之為發問為因禪能發心但希向論發心答俱有其義若能希向名之為解解為行本因禪增進悉稱為發問菩提心非常非斷為當別有一理為當盡此常斷而言非常非斷名為中道答此約空有二門云云問何不取真為佛性耶答中道是究竟真俗是境界佛性耳又約理為言一切諸法悉有安樂性何簡真中耶答約教見真者未見佛性也問悉有安樂性草木有耶答入理悟於平等法界者無復人草之殊未悟謂其事別如夢種種悟已則無之問迷實相起苦集解實相生道滅道滅異苦集苦集非道滅苦習非實相道滅亦非耶答只迷實相為苦習只解實相為道滅譬寒結水而為氷溫融氷為水道滅亦如是更無別中道異於道滅異於苦習也出法性外無法故故不離也問寒結水為氷氷喻苦習寒喻於違今融氷為水水喻道滅溫喻中道何得道滅之外無中道耶答不然寒是習氷是苦溫是道融是滅豈得異溫融而別有水水喻既然不得更求中道也問菩提心與願有異耶答心是正體從體起用名為願問論云菩提心名大願今四弘亦名願是則體用不別答此用從體起不得相離體願用願故通稱願耳問若願能顯體六度亦顯體此今願耶答願顯體者四弘是行顯體者六度是顯義乃同行願為異釋第二正明修禪所為者前菩提心是目今修行是足目足修故能入清涼池從此去為三初從欲滿四願去是行行二從我今住何法門去是依禪為門三從問曰何不遍行十度去是明禪攝一切法也今初修行行發四願以四譬譬四願如文次明依禪為門者還是欲滿四願如須入禪能令願滿也從六通四辨去是明滿第一願六通從禪定生即是福德莊嚴四辨即智慧莊嚴先已神通伏高心欲説法令悟道故大經云先以定動後以慧也又發通有三種通教通從背捨勝處願智頂等禪發別教通從自性等禪發此二俱從禪發也問五六云何異答通教為語斷正使名漏盡通亦得稱六但習氣未盡故稱五若別教者已取斷無明亦稱六未是究竟但稱五五六俱得稱也從欲斷煩惱去是釋第二願夫斷惑必由智慧智慧非禪不開大經云無定者平地顛墜手書異文口宣異語身涉異徑故知心數亦須言定數何説智慧耶又如小乘無漏因七依定斷見依九地斷思又大乘一依自性禪生似解故名菩薩藏聞思前行因是得入一切禪一切禪有三種現法住禪即是發真見理捨離味著及一切相華嚴云初地正使及習一時俱盡無有餘者此是斷通正集盡又分斷別惑分生真智如目喻云云見理發真名為現法樂禪也二者出生種性三摩跋提即是增長中道之定福德莊嚴也三者利益衆生禪菩薩住是禪以義饒益皆與同事令離衆苦但發一禪即具三義乃至清淨禪菩薩住此禪得大菩提果皆在禪中故知禪能滿第二誓願也從欲知法門去是釋第三誓願欲知法門者有兩種正道助道行行智慧雖是助道且依禪發慧行正道只是深觀事觀空諸助道門能發智慧亦是用禪若數人只觀行行無相真空名正慧雖復兩殊要修禪獲乃至小乘佛樹下觀四諦三十四心斷結成道轉法輪入涅槃無漏火燒身如皮囊盛砂利益物無不悉在禪中復次大乘為語禪最大如王世間正助出世正助最上正助皆攝在禪中故瓔珞云佛依清淨禪得大菩提果又入王三昧説大品入無量義説法華又大涅槃入深禪定窟一切衆生悉滅盡相令不復滅即大涅槃何曾非禪或時現入或時不現入而心常在定不以二相現諸佛國無不定時故知禪中具一切法門通教俗諦法門為事真諦法門為理別教真俗皆事中道為理如是等事理三昧悉在禪中攝故知修禪能知一切法門即是為滿第三誓願也從欲具佛道去釋上第四誓願者佛道即是涅槃料簡橫竪如前云云涅槃有二一分二具小乘斷欲界惑生梵天亦名解脫亦是分滅義故言梵天無欲界惑若子縛斷名有餘涅槃亦名分得若捨果縛名為無餘涅槃即是小乘具足如此之法豈非禪定之力方得圓備耶若大乘分具者二乘分具皆名有餘涅槃何以故深惑未斷故若自性禪中住法樂禪但見真者名有餘涅槃若得三摩跋提定慧具足名無餘涅槃從此任運入薩婆若海名無住涅槃雖復無住未是究竟至清淨時方是究竟前三涅槃皆是有上後一是無上無上涅槃非禪不剋何況有上耶當知修禪能滿第四誓願也金剛三昧者若小乘中明無礙道最後心方入金剛三昧即證第九解脫道若通教明八地明金剛三昧若案華嚴明十發趣十長養十金剛金剛即是十回向位若圓教始從初心深行堅固猶若金剛乃至後心亦稱金剛如月明晦如仁王云釋迦牟尼入大寂定金剛三昧當知大小次位無不入三昧而成佛道禪滿四願其意在此也偈中云智藏福田者此是正助定慧之意以此消第三誓願也清水洗塵此證通教斷惑金剛鎧此證別教斷惑此偈證第二誓願雖未得涅槃去至摧結使山證第四誓願得六通度人者是證第一誓願囂塵去是證四誓願云云第三從問曰何不遍行十度去是明禪攝法盡上文開般若出方便智二度今以一切智名般若度道種智名方便度一切種智名智度智度從中道第一義三昧出方便度從俗諦三昧出般若度從真諦三昧出上益於下故智波羅蜜總此三法也漚和俱舍羅此翻為方便泥滓烏几反此翻為願婆羅此翻為力闍那此翻為智云云釋第二料釋名章前簡凡夫著愛外道著見二乘無大悲方便此通教簡共不共後度無極就別教簡共不共云云翻名以定對果準例可作此翻然釋論料簡云四禪但名禪不名波羅蜜當知禪定是異名不得以定翻禪又諸師釋翻為棄惡此乃對果之名定發故方能離惡離惡是斷義支林是智義此就果義以棄惡為翻耳三種釋波羅蜜者通教菩薩觀真入理此就到彼岸為便別教斷塵沙假中修行此就事究竟翻為便圓教事理雙窮空假洞曉此則無極翻為便如此三種即可對慧法佛三眼也又若圓通為語者此之種智至佛方窮何以故二乘雖空不窮空源又七地菩薩或時偏修空佛即立喻起之云諸法實性故二乘亦皆得汝云何欲住無邊空門汝由未入不應住空當知慧眼至佛方窮故法華云願得如世尊慧眼第一淨又云大果既圓邊際智滿無量劫中例修凡夫事照假分別至佛乃周中道之慧居然可知圓論三義具在一心究竟妙覺也問五住何輕重答俱重俱輕四住乖理起逆名之為重無明理鄣不起拒逆名輕又無明是根本佛智所斷名重四住支條方便智所却故輕論師云上上智斷下下下下智斷上上此取四住為重無明為輕云云問三事窮佛菩薩何得名波羅蜜答因中受果名耳問涅槃是果二乘得受涅槃名何意不名波羅蜜答涅槃名滅二乘但求出苦見思苦滅與涅槃之名不求作佛不窮理本故不受彼岸名若通義三獸度河二乘亦稱到彼岸也問初地已三觀現前七地云何沉空答菩薩初得圓時三觀現前空理甚深或時偏熟此理或可偏以此化人譬如誦經初則三契俱度後偏理一契七地研空亦應類此從第三料簡去有四問答一明禪廣大遍含故二約四法料簡依根本故三者禪是一名得復有異三復次初問禪大含衆法二問約智定等三約思惟修遍通諸法思惟即是翻禪之名故以禪當名若智定等者四禪有十八支四一心支是定攝十四支是慧攝定慧具足能發無漏故論人云智是苦難行定是樂易行或樂難行或苦易行若智中發無漏即是苦易行不發即苦難行樂中亦如是數人云苦違通苦不違通此之據智樂違通樂不違通此就於定但無漏於定不發如應於慧四禪既具此定慧故名為等餘法不爾不名為等也問四禪以何為境體等耶答初禪覺觀為境乃至非想以非有想非無想為境問若以覺觀為境者為用此覺觀心觀境為用一心觀境若以一心觀則不名一心若以覺觀觀境觀云何復觀觀答數人明心王心數同時起此則有能觀之心觀覺觀之境若論人明別有淨細之心觀於覺觀之境云云體者論人五支皆是方便一心支為體數人以欲念等為方便五支皆是體釋論用此論成論人定內辨方便已四支粗故非體數人就定外為方便五支由是起故俱是體今釋有通體別體俱有一心是通體以通約別初禪以覺觀為體二禪內淨為體三禪樂為體四禪不動為體以其別體簡於一心此是覺觀一心此是不動家一心也論家明其通數人合慧若如瓔珞云五支皆方便第六哩然為體此則以五支皆粗同屬方便取其靜細為體此還是通意耳四空無支林復云何一則通以定心為體二若將境來約為別體如緣無邊空處明一心即以空境為體瓔珞云四空有五支所謂想護念止觀一心通皆如此還是通義無別異支如四禪中相也又中間禪未到地若約四禪應通四中間四未到舍利弗毗曇具出之云云但中間未到相貌相似故俱束為一未到為一中間中間者前禪之兩楹故言中間南嶽師謂此為離定地離初未二故言離定地亦云篾屑禪但有一靜而已喜是退禪處如人遣婦人未得新婦失樂生憂此退或但還初禪或令失初禪若能強觀行深厭下乃入未到發二禪此中但有智觀而定少亦非均等也次明思惟修此語則通絓是一切諸禪皆稱為思惟修又有別名別往攝則失思惟修思惟修往攝攝得別名舊法不失兼攝勝者故用思惟修以翻禪也次約四法互通者通則四名互得禪以有支故亦定以一心故亦三昧離五蓋邪曲故亦名波羅蜜五支究竟故餘定三昧波羅蜜亦如是若別論各有主當禪乃具支沒定從支四空乃有通支捨支從定故瓔珞云禪名支林定名捨攝三昧從緣理無漏調直波羅蜜取事理究竟到彼岸以別簡之令不混濫故禪但名禪四空但名定未到中間從兩楹挾之因他為名名為禪也未到將發因中説果故受定名未緣理故非三昧不究竟非波羅蜜空無相者但緣理故雖入初禪不受支林之名設使名禪但名淨禪不名味禪但是調直不名支林也雖有理定正是深味著事相直入於理不從定得名未是事理究竟不名波羅蜜背捨等因四禪發亦禪亦定以空無相心導亦不稱三昧從背捨等勝名也非想定亦爾雖具三法取其無間無間良由於定云云有覺有觀此亦是無漏空無相心來入諸禪能斷六十二見之曲受三昧名沒其餘名願智頂等是禪家功用福德藂從此勝用受禪名願者作願要期時至乃起若智者於禪中遍知事理以禪力能知頂者根本四禪中一切事理最極之處諸定之上稱之為頂也菩薩於頂禪不爾雖在於定如修羅琴隨欲出聲而於定心不起不二能不起滅定現諸威儀云云九種大禪但名禪者即是大乘禪也此禪能出一切萬行功德無不於此而生此禪亦名定亦名三昧亦名波羅蜜等而今受禪名者趣舉一名耳集八禪衆者從自性禪至此世他世樂禪集華嚴中為説第九禪令入離垢三昧故言集八禪衆也他家以四禪四空為八禪此大乘義何以故二乘尚不聞自性禪名何得集此八衆聽問無漏緣理名三昧者為當能緣為無漏所發之法名無漏答説智及智處皆名為般若所發無漏導能發皆成無漏也問波羅蜜為當是究竟理名為當理中更有所生之名耶答到彼岸者是究理處名更有所生者由波若照一切衆事畢悉且得名云云今此三義釋菩薩因中受波羅蜜名者因中説果如説金為食食由金得名金為食菩薩望果修因因名波羅蜜二乘不行中道化衆生既不行佛果因故未得受此名二者分觀中道見佛故受此名二乘非是開佛知見自此之前皆名邪見如星辰光非月光初月光是分光故菩薩分受名也二不別得名者此就理得名一如無二如因是實相更無差別故名波羅蜜也第三釋門者既知名識體則修之有由故次辨門原其根本但是一心更離心出色此二為根本即是善惡之本亦名毒草亦名藥王亦名夷塗亦名嶮路故大品云色中無味相衆生不應味著著故即是毒草嶮路喜多害命壅塞不通不名為門又云色中無離相聖人不應得解脫解脫即是夷塗藥王即是通相名之為門又色中亦有非味非離相若色但離為門止通至化城非味非離為門通至究竟寶所心為禪門亦復如是俱有離相非味非離即是大小諸禪本於色心出色心外更無別法設令外道執此離陰即陰癡心多想起六十二見謂有諸法終不出於色滯此成壅佛子觀即離等我不可得約此論通若作三聚明義色心非色非心亦不出色心按無作之色從色法上生更非餘處至受報時還是善妙色心雖作三聚終不離色心又三無為者亦不出色心若非數緣滅者良由有此色心得説緣過之法若入過去名為非數緣滅若無此色心説何物為非數滅耶故不離色心也若數緣滅者以智慧法治數緣煩惱煩惱得滅如暗室通夜有暗相續至曉而今以光照了令相續之暗不起智慧破惑亦復如是故名數緣無為明慧即而論也虗空無為者以色心對非色非心之處名為虗空無此色心名何物為虗空相待而論亦不離色心問大乘中復有法性無為非佛作天人所作與此色心復云何答性是名色性名色是性用用不離性性不離用若名色非性用者即是離性外別有色心色心非性家之用今不如此故知色心攝盡也乃至陰入界等皆是開合色心更無別法當知色心名為法界若通若塞若毒若藥若染若離悉攝其中故以名色為門也今開色為二門即如經説一不淨觀二阿那波那門對心為三門若從佛教為次者初破貪著説不淨觀行人相過六十比丘雇麻杖自害佛便更説勝法所言阿那波那十六特勝厭患縱容無自害之咎是故先説色門次説息門若定慧相生次者息是定法不淨是慧因定發慧須先明阿那波那次明不淨又阿那是舊法不淨是客法今依佛教先不淨觀門也此二門同是觀色法色法即四大不淨觀觀於地水二大先作假想壽命之風既斷火勢即滅水漬地水大地覆阤爛壞膿血不淨九想十想等皆是觀於水地能壞貪欲也阿那波那是觀於風火二大悉依於風風即出入息息亦是色法能治亂心他解壽命是無教法若以出入息為命此命即是色性觀此息法入出長短遍身能見身中三十六物發生諸禪故以此為門也今若總對三門者以此心色息對世間出世間出世間上上三種禪門也如大品明世間法施即是十善道四禪四空十二門也出世間法施即是不淨背捨勝處三十七品也上上法施即是十八不共無畏十力一切種智也息門既是舊法凡夫外道共修故屬世間法施色門是客法能破惑出生死故是出世間法施心性幽微詣理深妙故名上上法施大集明三種攝心出法滅法非出非滅法若依數息故發十二門支林功德諸法生故亦是出生世間之因能招世間之果故名出法漏心滅法滅壞因果斷子果兩縛畢故不造新名為滅法漏心也不出不滅者不出不同凡夫不滅不同二乘非凡則非生死非聖則非涅槃遮此二邊名為上上漏心明數復為三一數息門通至十二禪二隨息門通至十六特勝三觀息門通至通明禪也問前十二門可是世法後二門不應是答此禪是亦有漏亦無漏未能決斷治惑斷惑力弱名有漏而復厭離諸惑小勝十二門故名無漏又利根人用此發無漏名無漏鈍人不能除名有漏雖復如此同是息為門又同依四禪發故故屬世間禪也明色為禪門即開為九想八念十想釋論云九想為粗十想為細九想如縛賊十想如煞賊或言九想是十想之一支無常想耳若修九想怖畏心多令修八念依怙有地厭背心成作十想分明今直就十想對三道前三想對見道中四心對修道後三對無學若是燒想滅去骨人發無漏時成壞法羅漢不修燒想轉變此骨成不壞羅漢即是修八背捨觀也所謂內觀色外觀色名初背捨如是次第成八背捨皆是約色而論若修勝處者還觀色多少好醜更不約餘也若修一切處者還是觀淨色遍而若九次第定還從初背捨次第無間心入若師子奮迅者還從八背捨次第而出若是超越還約八而超是名不壞羅漢俱解脫人皆以色為門也釋論料簡八解脫與背捨異因名背捨果名解脫或有説云不異若不異者背捨即是解脫羅漢既具八解脫可得只是八背捨阿那含未得非想滅盡兩解脫雖修八背捨那得是八解脫故知應異若大乘以實相心行如來行入諸法中皆是解脫亦不待至非想滅定此無俟論其同異耳心為禪門者法華普賢觀云一切業鄣海皆從妄想生若欲懺悔者當懺六情根端坐念實相衆罪如霜露慧日能銷除又云我心自空罪福無主念實相者即是心為門也般舟云有心想即癡無想即泥洹心之無垢名清淨五道鮮潔不受色有解此者成大道此亦是就心為門若大品中明覺意者但是覺於此心故首楞嚴者修治於心猶如虗空又自性禪者即是自性清淨心能觀心性名為上定當知皆是約心為門心門或但止其心而無觀慧者此發禪時多與四禪相濫墮世間禪中佛在世時有比丘修此止心若發未到地時不見身心床鋪謂無人法言得假實二空次發初禪謂是初果發四禪謂是無學起增上慢臨終見生處起謗便墮地獄故真止心與四禪相濫也今欲止心修空時當識知空法從緣而生空法塵對意根生此空識乃至非空非不空等法塵對意根生意識此識從緣生緣生即空不受不著若初禪發時止知是禪是法塵對意而生衆緣無性無性故空不染不著那得墮增上慢中又有觀心者是覺心覺心者是體妄了心者是即事體達不煩撿覔也若觀心者於五陰中但觀四陰撿覔此心為常為斷為苦為樂觀此四心即是觀於世諦發得禪定通至聲聞涅槃故法華云若人遭苦厭老病死為説涅槃盡諸苦際即此義也若覺心者覺知此心是無明幻出生死滅斷常欲知無明是幻不可得當知從無明出諸行名色取有四心一切生滅等皆是幻化若知無明不起取有但覺此生滅之心皆從無明幻生勞權檢即是體妄之義故經云若人有福曾供養佛求無上道為説緣覺此即通至支佛涅槃也了心者即是了不即理生死即涅槃不復可滅本自有之思益云生死即涅槃無退沒生故無明即是明不離無明別有明何用撿心體妄然後為是故云若有佛子修種種行志求淨道此即通至菩薩道一往心門是出世上上通論色亦爾或覺諸心入於非心是入空等三門是三觀意問上明直就心修止發法墮增上慢今直修空時證亦應爾答直止是盲故證不識偽修空是觀慧發則知邪正邪正不濫故云修定多受福悟道難修慧少果報而疾成道即此義也問欲界定斷欲界惑耶答就禪論斷伏者欲界定伏五蓋名伏欲界事鄣惑得未到地斷事相惑伏於得繩名伏性惑得初禪斷性惑是斷繫地得繩也下去例上爾問未到斷相伏性應名欲界定答本伏相已受欲界名此更從勝耳成論猶是欲界定也釋辨詮次者夫禪本是門戶詮次淺深階級決應分明不使謬濫今三種次第先從戒起以戒淨故能生於禪故若論於戒者戒是防持防持如有人人即攬五陰界入之法以成假人應須先辨陰入界之法以顯行人人法之相也次明持戒如有所防所防者只是十六知見見愛三毒五蓋十使等諸惡為戒所防次辨能防法者即是戒也即是十善三歸五戒等法也因此戒故次發四禪十二門禪十六特勝出世上上等禪一一次第皆有所以具如法界次第量略門所辨載在彼文今不具説所以根本禪為首次至出世諸禪者此直約小乘漸機論次仍明大機次者此約從漸至頓根機為次也若直頓者但約自性禪為首終至離見清淨淨禪問此漸漸頓頓與大品明次第行學道云何同異答或有解云行學道是一法異名更非餘法物今欲分異者次第行是事相未論觀慧名之為行此即是世間禪次第行也次第學者論有觀慧故修無常時有學人無學人俱學無相真理故名次第學此即是出世間禪名次第學也次第道者道名能通究竟之通通至大菩提果亦能兼通前學至菩提果即是出行世間上上禪名次第道也復次只就一種禪中即明三次若根本禪中無觀慧時名為行有觀慧名為學發無漏名為道又初調息時名為行欲界未到等名為學非想名為道若就出世禪中明三次者五方便中非學非無學位時修諸背捨行行之法名為次第行四諦十六行慧行苦忍真明發至那含位名為學止羅漢盡智無生智名為次第道若約通教八人乾慧等名為行見地去名為學六地去名為道別教三十心名為行登地名學妙覺為道圓教十信為行十住為學十地為道又十信為相似三次十住是分證三次妙覺是究竟三次初亦三次後亦三次云云釋心法章問九想背捨等是事法何得名無漏法答雖是行行行事法能發於理當此觀時厭背心強決捨有漏能發無漏故名無漏法問自有人修四禪四禪不發仍修九想不淨等四禪得發此是發有漏應名有漏法答當體是二法能發無漏又兼發有漏不應從發下為名又問若爾修欲界定證電光時發無漏亦應呼為無漏法答此是利根宿習強能於欲界定發無漏欲界定體是有漏也例如不斷善根人者此欲引例明亦有漏亦無漏義也如四念處有信等五法而退為闡提名斷善根位頂法亦具信等而猶退為五逆四重只不退為闡提故名不斷善根至忍法位信等成根此決不退為逆重一向升入無漏只頂法中有退義故名亦有漏又自善根名亦無漏故引此為例也乃至苦忍真明發名無漏思惑未斷名為有漏又斷五下分故名無漏餘五上分故名有漏至羅漢得盡智名無漏未得無生名有漏得無生方名無漏也問經稱中道為無漏此中呼為非有漏非無漏耶答此開張四句使教語方圓是故兩非經中句結但稱無漏如二乘對生死為無漏實具別惑勝鬘云有為有漏是聲聞僧大經稱為聲聞是福德莊嚴故知是有漏若遠離通別惑盡離有離無名真無漏從束從開各有其意云云乃至非我非無我世出世非世非出世等皆例有開束云云世俗漏真諦無漏兩緣是亦漏無漏中道是兩非開即三諦束即二諦也問圓教初心名為非有漏非無漏二乘初心何意不名無漏答圓教初心二邊俱斷二乘初心與思合故不為例四句判戒者十善是舊戒但防三途報若人天有漏中三歸五戒亦未有厭背世間防止出世之過此皆名有漏戒八齋戒沙彌戒此中防止不執生像𭊴香非時食等已有防止身口厭背而未決定斷奠世間諸惡即是亦有漏亦無漏戒二百五十為出世故是無漏戒十重四十八輕不為化城亦不為人天果報故兩非之戒也所以開此四句者教門化物多約此四句廣辨諸法即是今師所明四門入道之意一一教中皆約四門四門即是四悉檀赴緣不同會理無異若三藏中明四悉但約二諦別圓約三諦云云三藏中約禪為四悉者十二門禪是樂欲特勝通明是為人九想八背等是世法如以屑出屑屑出成無即是漏對治故大經云假想觀者亦實亦虗實即無漏虗即有漏此三是俗諦發真名第一義悉檀也六度菩薩四悉義同但以發心作佛為異耳通教二乘亦不異菩薩則真諦有含中接別之意此真義含於中而作真名還就此辨四悉也別教以真俗合為俗即是樂欲樂説此兩即為人偏以無治有即對治悟中即第一義圓教者如論偈説一切實等四句皆實佛於此四廣説第一義悉檀若然者通論凡天四見三通別圓等四門即是圓教四悉檀也何以故生死即是涅槃即五色是空空是第一義尚即生死是第一義悉檀何意不即生死是三悉檀生死尚是四悉檀二乘別教菩薩等四門何意不即是具明如此等法即是不思議俗名世界悉檀以如是等逗物便宜是為人治惡是對治見真中是第一義也問有漏心生死沈沒今修無漏法而升益可得無漏心是涅槃升出而修有漏法應損失耶答無漏治有漏是故以有漏心修無漏法能致出離之益有漏是福德譬如膏薪無漏是智慧譬如猛火以無漏修有漏轉令無漏明故不為損問無漏修無漏復云何答無漏有兩種行行慧行修行行亦得稱無漏修無漏又云以復觀前觀練前觀亦稱修無漏也非有漏非無漏亦例然問二乘有出入觀可得無漏相修復有事理於義為便中道不出觀非事非理云何為例答大乘有恆沙佛法不思議俗諦何無事耶又經不如二乘出入亦有寂而常照照而常寂善出入住百千三昧之出入緣修用顯理真修理照用此皆其義何得不例耶問他執生為性龍樹以四句破之今復云有生無生等當知復為龍樹破耶答他明生定名生性或可以他生破自生而立他性故須破之今龍樹破四有性立無四句可有所破既無四句復何所破問破他有四句不立無四句豈不墮斷答雖四性不妨假説四句文文字字既漸漸則無性不墮於常假有四句不墮於斷大經云言無不同兔角言有不如塊然問何意立假四句答為四悉檀因緣故問若爾既為前緣復墮為他性答前已四句撿自他不得於他無猗無著譬如幻師為他幻作色像耳此約無執為他無咎只以如幻故不墮斷幻非實故不墮常云云釋第二卷上第一卷所辨名之為解目自此去所明名之為行足故言方便也初禪初品定難發譬如度國大須功力多用方便乃可得勉欲色難過亦復如是是故發菩提心內信堅固外善覺識所以名為內外方便悉在初禪之前若得初禪時亦得作方便厭下攀上二禪即發例如五方便停心總別念處種種方便乃發苦忍若得須陀洹任運七生尋加功有三二一生成辨四果故知前難而後易也大乘亦爾於十住十信中種種苦到無量勤苦乃得六根清淨發菩提心似解之位若入十住真明成就任運流入薩婆若海以是義故須委分別顯示真偽令用心善巧使與禪相應故名內外方便也外方便有五重四出釋論唯調五事是法師採經意以為調適定慧法故立五方便也就初具五緣此名乃出論論師不具列之四緣雖具足開導由良師此乃總名今更將禪經分別釋此五緣名字也生起外五方便云云釋第一方便文為三初明持戒二辨持犯三明懺悔初釋戒相者若佛在世深識機緣知證戒相金口記莂有十種不同佛既去世故無此緣設令有者無人證莂不可以此九法定尊卑位次序唯取現前十衆作法成就以判得戒餘九不同云云十利者從攝衆生已信令增長即是念處𤏙頂等位從斷今世漏是苦忍發見道位斷後世惡是思惟道斯陀含那含位梵行久住是無學道位也防於外非名護制於內妄念名受持乖本心名違犯毀無作名觸犯如薩婆多明持犯相者若能持戒約本大千國土有識無識諸境上皆起無作善若於一女境初犯者名破無作善戒第二更犯不名破無作無作已破故但得作罪於一女獲罪餘境猶有無作戒持戒者即是五枝諸戒具足也智所讚者此明菩薩為衆生持戒為佛稱美也隨道定者別約道定上發得無作善名為戒犯戒者約愛見兩羅剎乞戒浮囊約愛心纏著五欲初以微塵許輸羅剎次以手許乃至全乞謂入涅槃此以恣情怏意為安稱此為涅槃實是生死為愛所噉若約見心者隨取一見言是事實為涅槃此人不識見心中苦習於恚處生恚愛處生愛稱美則恚毀謗則憂是我非他則慢實非道為道此則非因見因名為因盜即是戒取實非涅槃而言涅槃涅槃是果非果果見名為果盜即是見取邪僻不當即是邪見如是身邊穢污五陰即是苦集苦集故無道無道故無滅為此見惑所欺全失浮囊皆當墮三惡道凡人犯戒出二條廣解云云明懺悔為三一明懺法二明罪滅階級三明復不復今先明懺法又為二一通明懺二別明懺通明懺者凡夫罪從心生還從心滅若心顛倒遠離實道恣身口意自戄戄他自受苦亦令他苦出生入死常而與苦俱若欲懺悔者因時可救果無如何今明罪從心生為十種一內心顛倒起諸煩惱二為邪師惡友所誤三因此破於善法善事四縱身口意造諸惡業五念諸惡事六常起惡念七不知發露改悔八不畏惡道九不生慙愧心十不受善言不信罪福因果以無信故能斷善根趣向一闡提道不能信用善法之言譬如無瘡毒不得入則為底下極惡之人罪從心生其義如是今明懺悔翻破此罪還從心滅亦為十意一深信因果二心生慙愧三怖畏惡道四發露悔懺五斷相續心六發菩提心七修功補過八護持佛法九念十方佛十觀罪性空信因果者信造罪之因是三途業還得三惡果報信愛見兩羅剎是苦習法隨是法故當得極惡苦果乃至信四種四諦之因四種四聖之果是名深信若不如此非深信也第二慙愧者今我出家為道修涅槃法乃為愛見所欺尚不逆善人之流不令凡僧有卷之數何況聖衆慙耻內生是為白法能救衆生云云第三起重怖畏者我已造如此惡因必招惡果無常必有溘至不奢華罪未除苦事將及心不慙樂常懷怖畏如二女人破瓶懊惱云云第四須發露者譬如種樹擁埋之則茂露之則枯若發露罪罪稍銷除故言發露心得安隱雖復內懷慚怖外不發露則猶護惜不名真悔能不隱諱是知慙耻第五斷相續心者雖復前來慙露如畫水還合遇緣復起應須斷相續心如吐在地不可更食第六發大誓願菩提心慈悲憐愍一切衆生起四誓願衆生不覺不悟為此而起大悲如前四種發菩提心云云若發此心是即出家是即具禁戒第七修功補過以昔身口意起過今亦身口意為功昔晝夜造罪今昏曉修福昔身受細觸今身受苦受昔口為過今口誦經呪昔意思惡覺今意念實相乃至六度等善法云云第八護法者勝鬘云一切功德無邊護法譬如護國其功甚大雖有重罪自得重賞何不厚今護惜三寶亦復如是福量無邊尚得成聖罪不滅第九常念佛佛是無上大智慧聚無量神力冥加罪滅譬如日出水雪自融亦如醜人在端正人邊自耻自愧云云第十觀罪性無生者罪從心生心有故罪有今觀心空心空故罪空從前心起十罪初從煩惱而起至一闡提今論懺悔從信心而起翻破不信生重慙愧破無慙愧止生於怖畏翻破不懼惡道須發露者翻破覆藏斷相續心翻破恆常惡念發菩提心翻破念諸惡事修功補過翻破昔縱身口意為護持佛法翻破破善法善事念十方佛翻破昔為耶師惡友所誤觀罪性空翻破昔顛倒煩惱煩惱既淨即順入正理登聖人位翻罪罪滅發真悟道是為懺悔之至要改過之良術云云復次前五法至斷相續心此懺根本前後眷屬兩戒從護正法念佛補過三法懺惡覺戒何以故此三是善覺故菩提心一法懺回向三菩提戒觀無生一法懺念清淨戒是名十法懺五支戒即是尸羅清淨三昧現前以根本律儀惡覺戒淨故世間三昧現前以念清淨戒淨故即是隨道戒淨但燸頂等是相似道戒亦應然雖是似道非無漏如賊中人歸心降國不名為賊念處皆是隨道故此中戒亦是隨道能發得真此隨道戒淨即真諦三昧現前回向三菩提戒淨故中道三昧現前得二十五三昧也故大經明持五支戒意即明發流光八色辨初禪之相也及八背捨住堪忍地以王三昧即是五支尸羅清故三諦三昧現前云云別明懺悔者即是三種懺悔一作相二觀相三無生大小乘通論悉具此三別論小乘但作相大乘有兩種作法者是運身口之善翻於身口之惡觀相者深識善業相以翻惡業觀無生者觀察根本根本既淨枝葉條即淨此三即是戒定慧戒防形非定除亂念慧悟想虗故約三種論別懺也作法懺輕罪一一方法備如律文但重罪四分不許如十誦但許發露竟在沙彌上大僧下不得預法事證戒等事名與學法也若如四分前明結淨地十誦復彈云結淨地是前事後時已度那得用之開學不開學例應如此又案十誦未許羯磨懺重至初教經便許羯磨十誦不許在大僧數初教經懺粗得在大故當知不可定執也觀相懺如方等所明方法一一在諸大乘經云云觀無生懺文中為六一出其法門二明懺心相三作觀除滅四弘經證五衆經同爾六明罪滅相此六意在文細尋取之也明懺心者罪起由心不出二種一事二理迷事起身口諸罪迷理起一切邪倒今懺悔翻此事理二迷遠成事理二心事心雖多不出大悲覆護緣一切衆生拔苦與樂拔輕苦翻昔事中輕惱衆生拔重苦故翻昔重惱衆生與輕樂故翻昔奪他輕樂與重樂故翻昔奪他重樂此是福德大力能排鄣道之罪又理是心之本原良以不達心性愚暗迷惑今觀此心性如虗空智慧清淨如日照暗此之智慧翻於迷理理亦深淺偏圓二種慧無有漸頓相翻云云修因時福德名行行慧名慧行至得果時即是兩種莊嚴云云二明修觀有兩一約三世二約現在三世則撿生滅無常剎那不住即是半字教法若現在撿四句無生無滅是大乘滿字法即就此為三翻一因成相續相待他呼此三法真是因緣因成因緣乃至相待因緣今名此三種皆是解惑所以者何三假皆是取真之方便若因成得悟即解因緣若不悟即惑因緣餘亦如是因成就外塵內根合撿相續但約內意根撿相待不復約別無生乃是約通無生別無生者是生法遷後名滅此是相續所論今虗空之無生未如是生已為無乃是不生不滅之理滅色論無是事今不生不滅是理相待此理無生是相待相論此理何止待於相待亦通待於上兩故開善云因兼二假或亦過之兩假中迷未必約相待起惑若相待中迷即具兩假故言過之具論觀法備如止觀中辨云云問性罪與根本罪云何答曰無作罪約受戒者有不受者無不受戒者為惡體自是罪若不放逸體自是福故名此為性善亦名尸羅尸羅即性戒也根本是無明能為衆罪之本是故為異云云釋第二方便中頭陀者名斗籔福也蘭若離放牧聲處亦名離牛鳴處也理解者無所味著如是數福也問六度中何意尸羅清淨禪定現前何不檀忍等清淨為緣答此有兩義一別二通別者持戒是淨業鄣業鄣鄣禪故次須淨戒又云施是依報施與不施不正鄣禪犯戒是正報上起罪遮定事深故須淨尸羅方能發定若嗔心是一蓋名煩惱鄣亦能鄣禪貪是蓋亦鄣禪此皆通論耳釋第二方便呵五欲者為五一標五欲大意二歷別出五欲相三總呵過罪四引經證五結成從生死不絶去至貪身無異呵苦習兩諦智者觀身觀苦不貪染無著是觀集是名真涅槃為滅諦如諸佛所説去是道諦也釋第三方便棄五蓋者若是外境五欲一對五根即謝現在時節促若是五蓋追緣二世五塵時節長念念在心覆鄣禪定名之為蓋也數人明嗔不至上又下界名貪上界名愛睡眠不至初禪輕通於上上地既有攀上厭下故掉悔至上成論明五蓋皆通至上界大乘明此五蓋束成三毒三毒迷法界而起法界無邊畔迷亦無量當知毒蓋通至極果極果豁悟法界法身無量故所得智慧亦無量得報亦大應亦無限故大品經云色無邊故波若無邊乃至識亦如是大經云因滅是色獲得常色色若有邊豈得為常當知法身大果應用圓滿極在妙覺不縱不橫具足成就豈容舍那坐一華瑞而判為報應滿法界何止一釋迦耶明三身優劣如此者皆不得意得意為言只釋迦即遮那故普賢觀云釋迦牟尼名毗盧遮那妙勝定云或見釋迦或見遮那當知法身遍一切處豈異釋迦別求遮那遮那既止三界釋迦何容乖此遮那既遍法界五蓋云何不通三界耶今言五蓋䨱禪者有漏禪無漏亦有漏亦無漏非有漏非無漏此等諸禪皆為五蓋所覆其故如止觀也問蓋通上地者上地何容更起三疑答此三是通始終自地已斷別輕為上地蓋耳問三疑何不蓋上地答初心於己實相於法界於佛等不了故成疑為蓋破此蓋得發禪上地不復疑此但於上地無量別法未明故得五蓋又鄣初禪是事疑上去是理疑云云問為當却蓋入禪為斷入禪答若依成論伏性得未到定斷性得初禪乃至非想亦爾但出觀時不妨散心中上地輕惑今將此例羅漢斷三界子縛無正使不妨有習氣却五蓋入禪亦應如是入禪時無蓋出定還起起時輕微不同未得定時蓋也何故爾散心蓋等是報法定心數亦是報法心數亦是報法定中起味貪成鄣蓋散中起貪表成鄣蓋若直散直定亦不能鄣禪然出禪時具有貪恚法約四句料簡能鄣不能鄣一根利無遮利有遮根鈍無遮鈍有遮有遮者不得定唯根利能得定有遮故有蓋今取其遮定故為鄣不取相對治一品治一品鄣也斷却之意尋此可知問五蓋何者正鄣有人言散動是正鄣掉悔也或言無知是正鄣睡眠疑是疑從癡生或言貪恚是正鄣此皆偏論其鄣今明五皆正鄣皆偏鄣故經云離欲及惡法惡法即五蓋何得止一種是惡而須離耶故知五種皆正也如身有四氣氣動發俱能煞人今逐其傍者或言熱死或言冷死耳語法皆正遍人則傍也釋第四方便調五事亦得約因緣偈為觀行解釋調適身息心三事縱容得所因是入禪即是因緣所生法若三事是有可論寬急若三事空寂何所寬急是名我説即是空若三事定有即是性有性有不可令空若三事定空是名性空性空不可令有今觀三事非性有假説於有三事非性空假説於空假空非空假有非有如幻如化幻化無實無實故空雖空而幻是故言有如鏡中像見而不可見不可見而見若定執有名急若定執空名寬今如幻化不定有則不急不定空則不寬遍入非道而通達佛道是名亦名為假名亦名中道義者若觀三事是性空性有墮有邊觀三事非性空非性有即墮無邊今中道正觀尚不見無性之空有何況定性之空有不得定性之空有即是不急不得無性之空有即是不寬遮此二邊故名為中道於一一法中悉能施轉諸法皆入一法無有滯礙是名中道義也釋第五方便行五法者亦約四偈欲從欲界入初禪即是因緣生法也欲從三界入涅槃即是我説即是空欲從空出假即是亦名為假名欲從二觀為方便入中道者即是亦名中道義餘四可知問從假入空破性破名以入今出假亦應出此不答菩薩為物物既宜此何故不得耶復次此五法者如人乘船欲精進念如篙橧巧慧如點頭一心如捉經云直心政前後方便乃得前又如鳥飛用眼視用翅進用尾正尾正是一心翅進是精進等眼視是巧慧云云如是等二十五法亦以自行亦以授人俱得俱失自行失者雖行此方便拘撿身心心無法味不得其意多有退墮得意者能以二十五法一一經心善巧調和方便得所法味日新次第增進化他失者若能深識前人種種根緣若保滯有相心在證得此應用禪波羅蜜大意章所明中道菩提心相畢竟空寂并簡非顯是遣蕩對著如暗室遇燈存保自淨若前人修空懷解豁達平等太過混無分別謂此為是此應用辨詮次章從初世間出世上上分別顯示與經論相應令無謬濫不相負貸猶如貫華線應有序若前人心謂禪是一門無所關涉此應用釋名章以禪之一名遍通諸法雖復異稱殊辨終不離禪故禪大如王言禪皆攝如派奔趣朝宗于海若謂禪但是禪無所出生此應用辨禪門章明色息心為行從此三門出一切法大小兩乘行行慧行三門悉攝如品物殊類悉依地生如是等種種對治前人必使稱機莫令差謬廣引經論讚美禪度能如是者前人必生慕樂丕夙受道則應以二十五方便而教授之又觀此人於五蓋中何者偏多若有所偏善巧方便而為除却前人既依教受學發諸禪定定中妨鄣此應用內方便而覺悟之以外方便去蓋除欲淨諸遮鄣故名棄惡以內方便增長善根是名功德藂林復次持戒布施但破慳防非不能兼有所治若修禪者廣伏諸惡方便中所明處亦廣如發禪時衆善悉起善利非一藂林之名義在於此是名化他之得也若不如此是名為失也料簡內方便亦得外用如未得定時魔事病患起應以內方便法而用治之內方便亦得外用者如得禪定善入出住調適三事是名內用外方便也釋第三品內方便者定內用心深識得失若能善巧則禪定增進若失誤乖僻非但不進亦能壞禪是故須明內方便內方便為五一止門二驗善惡根性三明安心法四治病患五覺魔事心若靜細能知世間生滅法相一切善惡即現其中既識其相若是善者即安心宿集之法是惡者即安心治之如是修習設身有疾即須治療使身安道隆道隆故道高而魔盛即當覺識若能內心善巧防護此等諸法即是破四魔三障所以者何善法根性發即是陰魔惡根性發即是煩惱魔病患即是死魔魔即天子魔惡根性是煩惱障善根性及魔事等是業障病患是報鄣若能善識魔鄣者禪定任運開發安心入定也第一明止門者若法眼識病授藥隨宜而教若六度通別教地前圓教五品等位不得法眼者皆有差機之失身子如是猶有浣衣數息之失何況餘人今既不識根性為當前用何法初教衆生今但以止通一切諸禪定初者為未知根性宜先習止也問佛説二為甘露門可得為初何意説止答初有通別二甘露是別止則是通止是靜定通發宿習之定隨其發者即用為門又止能通治一切惡惡是散動今以止擊之惡強者前現即隨強者而治加亦破之即是安心對治故止通生諸善通破惡故為通門之初今明止為四義一明止義二明立止意三明修止方法四明證止相止有何義止即定義經説有三種定謂上中下下即十大地中心數定也心數雖多隨所向處皆有此定故云若無此定手書異文口演異言平地顛倒以有定則不如此中定者即是四禪定法也若修之相應挺然不亂如蛇入筒筒令蛇直此法亦爾然定能令發定上定者即法性不動定無有生滅自性是定對於生死散動法名法性為定而此法性亦無定無可定尚無定之可定何得有散以無散無定名法性為定云云定既有三今明止亦有三一守境止二制心止三體真止以有心數隨緣隨處故故得有守境隨處得論修止若處處無止不可得約無止處修止以有止故得明守境止也二以有定法故今明制心止若無定法將何制心以有法故制心一處無事不辨竊起即止竊起即止心與定合束持心任運不散故得有制心止三體真止以有理性不動無生無滅理故今得有體真止體達理性性自清淨湛然寂絶無緣無念緣理入定故言體真止以此三定義故修此三止問此三止與止觀三止云何若是守境制心但是被隨緣方便止耳以得此隨處有定故能隨入一切非道之處無非佛道頗有一法無不是定取故言方便止若是體真止即有二義不含中之真即通教之體真含中之真即是別教之體真若開出中道即離為息二邊分別止同異云云第二明三止大意何故説此三止為四悉檀因緣故若是世界悉檀者有橫有竪橫明世界但説法相若竪論階位淺深即有上中下等差別之相俱是世界悉檀也為人者自有人便宜守不宜制體等自有人便宜制不宜體守自有人宜體不宜守制云云對治者乍將外守境以破煩惱散心或將內境制心破外守境或將理性止非內非外破於內境及以外境此豎明治自有橫明對治將守境破散動治穴鼻無鉤之失或將制心破散動或將緣理破散動如是不定此三止各各異相守境有處可緣守心但制心而已體真緣理無心無境對治不同云云第一義者自有人守境不得道體真得道自有體真不得道守境得道故法句經云有時佛説生法於無生法得度復次明修止者一修守境二修止制心三修體真修守境者繫念現前但取五處頂上髮際鼻齊足指餘非修止處偏故非修處故但此五處皆是暫時攝繫各有所宜不可剩言是長久好境若浮心動應繫足指足指亦是修不淨所宜若心沉昏應繫緣頂上若修白骨應須髮際若易悟無常應須鼻隔若欲安身治病應須緣齊自行修止亦須五處得宜若欲化他亦應用此但此五若久在頂則身輕心恍久在髮際自眩心浮久在足心沉多睡各有所患可意斟酌守此五境以守其心令心不散譬如彌猴鎖之於柱及以五鎖不令離柱守心亦爾雖復五處移易不令心散若猴疲極依柱而眠眠即夢心只如是繫之不散心則入定定則發生種種諸禪定又譬如未調猴不可教詔若調善教化伎能心亦如是未被止攝不可為觀既止定已可令入觀云云又若宿命修白骨於髮際即相應別先修不淨即於足指應若齊下守名為氣海氣出始此氣入趣此譬如海水水趣之湖出之若觀檢此氣雖趣無處所雖出無根源緣此修止心道下向兼能治救病也修制心止者向來為外境馳蕩以內境守之非心內外何可以境守之心是靈智之法煩惱起即制即制名制心止譬如調馬已可繫之於柱但騎之而制調若前透亦動後縮亦動左傍右傍隨動隨動動已馬方得調堪可乘御去住自在心馬亦爾欻起即制隨其起處即便制之心若得止乃可入觀若人不騎此馬不知其性騎之方覺人不生禪不知其心攝之則知是故名制心止制若非住即須凝心譬如翔鳥之翅住其細靜令禪得發前守境止亦如是若非想餘解亦住其靜住譬如獼猴眠時勿以杖䇿云云第三體真止如偈云息心達本原故號為沙門心空無主無主即是無性自他性共性無因性若是四性可得有主今心無此四性是故無主故云無明體性本自不生妄想因緣和合而生是故約因成相續相待四句檢之不見其性無故即真體心即真即事而真若有心可制可守今既無心無性制何所止譬如揚炎無實何所壅遏防止其非是故體真相如此又守境制心名為愚夫禪體真止名為推義禪緣真如禪名如來禪四句檢實不可得名推義禪念念入法流名緣真湛然寂照名如來禪第四證止者舊云餘禪門從未到地的有所發而止是通發諸禪通發諸惡亦無的有所證而金齒三藏明別有證相即是五輪一地二水三風四金沙五金剛若因止發地輪禪者如地遍能生一切此禪出生既廣不可的用一相制名總而言之名為地輪即對未到定也地雖能生不得水不生今水輪禪能潤漬遍生一切事禪故總用水輪為名即對初禪也風輪與空相依如風行空此風三昧行空無礙即是伏惑似於真道風能破壞故破諸見成伏道又能搖動發生成似道故即對五方便位若入真道名金沙輪對見道若斷思惟盡名金剛輪即對無學道通稱輪者轉也從下趣上隔凡成聖是為五輪次第之相也若約三藏五輪多從繫緣止入地輪從制心止發水輪繫緣止不發水輪若發宿習所不論耳非是修繫緣能發也又水輪亦不發風輪從體真止發此止通發止三輪也若通教多從體真止發五輪修上下自發或是宿習云云約別教者體中道之止發前五種輪止成方便道入金沙即初地妙覺名金剛輪若圓教體中道真前通別五輪只風輪方便道是六根淨位若發金沙即是初住金剛即妙覺若開善無金剛心莊嚴有之有者無礙道因轉即成佛智仁王云釋迦入寂定金剛三昧故知果亦金剛前兩教就後心菩薩及佛俱得此名二乘無礙解脫亦受若別教初地已去圓教初住去因果得受耳仁王大有家辨之或後心或七地或初地或初住若不將四教往判經文云何釋耶若真諦三藏諸師説有金剛之惑為金剛智所破此或如金剛破難可破若還白羊角龜甲即碎此惑亦爾餘智無如之何得金剛智破云云復次五輪不明火輪者火輪立世界時明此為輪今更不言者言水火相違是故不也云云復次三止既發內外諸善亦發習報何故爾譬如毒獸惡賊潛伏人舍若蹴迫撿授則知是惡物心亦如是以止證之惡心則起又惡應受報既今修止惡業快煩惱悼而起來遮其善令不成就責其報也若不治之能壞行者欲知其相云何報因發時無有方便却之有兩過一無入福德無以資發智慧二取之愛著心妨進禪定此既報相暫現即滅魔知此念續作相似報相而迷惑之能令人失心誑惑入於鬼道乃至於死若有方便不取不捨能增人天大福德又能助導禪不失正轍也習因發者善無方便却之亦二過一却之不能發宿習種種利益二取之乃一往是善心染著則從事物起永妨禪定若有方便不取不捨但隨喜一切善事及諸習法即足何必經身造作以隨喜故宿習自開了了分明以不須經身故不妨禪定則能有所進分別善不善者數人通稱煩惱為不善根亦名業三不善根即是三毒若通説互得若別論客客者是煩惱動身口意成行名業令習報兩因因禪而起云何相貌若惡境界起苦惱逼身心者名習報若起成惡心欲造五逆四重者是習因起也能治此兩種惡因成方便即是智德若翻惡習因為善習因即成智德大菩提果若翻惡報因大涅槃果名為斷德以是義故名內方便也次明數息方法用二十五方便研魔三事若調得入麁住細住若不入者必於二十五法有不調處細心研撿若不調而調之調竟而數勿數風喘但數息從一至十十過名增十少名減若妄數及疑此是散亂若能不增不減十數成就名一念即數成名十十念念成必得入也但判根有上中下奢促耳十念名上中下可知數但數入得多失少入是生息補養身命如人服藥出是滅息如人吐逆又入息吹火火溫水水持地是故身輕利出息乖上令身沉重無氣力又入息扶心心細易得定出息散亂乖心不得定入息能見內事三十六物發特勝知五陰空破倒見淨理出息扶外事見華光象貌多是魔事壞入定入息轉細實欲界且成色界法為八緣入初禪出息不成緣乖禪也是為數入息門相如是失相者數息不得浪數風喘遂致成腹脹煩滿應捨入數出此是暫治非修禪也是為數出家得其失如上云云數息得定凡有五分所謂退分護分住分進分達分退分者或外緣退或內緣退外退者二十五方便中有失無巧慧防持自是失定當歷二十五緣以辨相違之相明其退失也內緣退者於靜心內有三障四魔能壞其定若靜內起好惡相以不知故而生憂喜致起動念即失於禪是名退分護分者善識善惡等相所謂三障四魔若業鄣有二一現起業業名為作於定內即有諸有為功德善業起業惑起塔起寺緣像齊講無集種種馳求如此業起靜散相乖能壞定也二者幽冥業相起所謂過去造業未得受報而今修禪受生色界是故諸業來責其報令其定壞不得生色界故名業鄣若有此相起應當思惟良由過去觸犯致此罪失若不修禪應次第受禪力能出欲界業無之何況有此身應一心修在定勿生憂喜憂喜若生即壞禪一期若謝強者先牽若不如此名為內緣故退屬退分若能如此了別不失定心名護分煩惱鄣亦二種一現起煩惱相相起之後乃生煩惱此名煩惱相起若現起者即是三毒毒起當用對治治之相起者若見端正女人順情色來即是貪欲相現應修空觀不淨其心不動定法令得若見無頭手足殘缺破塔壞寺佛像狼籍即是嗔恚相現爾時當修慈定心愍哀一切復當念捨身命報償罪業若昏迷暗失境界相來者即癡相當用觀智照了我身自空罪福無主一心入於實際之中報鄣起亦有二一現事報二報鄣相現事即是疾病縣官憂厄等事爾時安心耐忍知不可避非山非海心無動亂定法不立相現者於未受報前或虎狼師子縣官枷理等相起即當忍受作捨身命心心若成鄣得轉後不受譬如巫師度厄尚能禳災何況定心受報而不消滅亦如國法不重害人若禪中作受報意業福亦不再至故八念中有念死其意在此云云欲分業報三相異者若見相後有報事起屬報鄣相若業相者但壞禪心未有報事恆作心察心轉明利相起即知不俟復驗魔鄣者三魔如三鄣天子魔當分別或作種種相貌總亂行者應須覺識若覺知有賊賊無能為入實際中一心不動則不為害內有十軍等名內魔種種相名外魔譬如有瘡毒即得入外由內進若三鄣尤重當為魔入鄣中也外魔有違順射破五根順名華箭違直名箭隨五根入能為惱亂云云由不識內外妨鄣是名退分能善識別內外過患防守定心安隱者即名護分因護分故即得住分若不護不住者良由往世不習護故今若不護未來無住為令住故雖退艱護後得成任運住分也進分有三一橫進二竪進三橫竪頓進若進發初禪已進入二禪乃至十二門等者是竪進若因數息遂發特勝不淨背捨等是橫進或頓橫竪一時俱進或直頓進或直橫頓進今且約竪進之相行者從調適得所從麁住至細住歷欲界至未到定此定間靜明穴如月之夜次覺八觸身者此是發根本禪也八觸者所謂輕重冷暖澀滑動庠輕動是風大庠暖是火大冷滑是水大重澀是地大此之八觸還是四大也欲界色界身別攬淨妙之色為五根則有見聞覺知之用今修禪靜細即發初禪色界淨妙之色來觸欲界之身是則八觸外來也又云還是欲界妙色轉妙起觸數息轉心心能轉火火能轉風風能轉水水轉地故起八觸譬如變麥為麵變麵為酒酒帶粳糟但欲界色無異於色界色是名觸從內出也如此八觸各有體用暖是火體庠即是用輕體動用冷體滑用重體澀用是故為八也若不斷欲界性鄣八觸不起斷故即起起亦無的次第隨人四大強弱若風大強輕動前起火大強暖庠初發餘例爾今且明動觸發行相行者於未到定中其心澄細鬱然覺其身運運如風發外人不覺自知有此若頭發成退分腰發成住分足發成進分發此觸時與支林俱生今且復十種功德以明其相所謂空明濡心自在定喜樂解脫善心智慧境界相應空者覺身如雲影豁然空寂勝於未到定時明者心地明了離諸昏暗濡心者離欲界麁獷𢤱悷剛強如腦牛皮隨意所用也定者其心湛湛無有散亂喜者知欲界已來未曾得此喜猗喜生樂同欲界受又因此喜來誤心是故而樂不同覺觀覺觀非受故不相猗解脫者離欲界五蓋故善心者既離五蓋即三善根生恭敬三寶乘此淺定尚然況三寶理不可思議是名信敬慙愧者愧於欲界應散慙於聖賢是名慙愧既得此功德精進不休二善根生故名善心智慧者以定靜故世智明了相應者心與觸及諸功德境界相應分別不謬無所妄失略言十廣則無量唯自明了是為十功德相也又約動觸論五支者覺此觸故名覺支分別觸中諸功德故名觀支亦是分別此觸與欲界觸為千萬倍異故名為覺觀只在一心而初麁為覺後細尋為觀譬如推鐘一聲初麁末細類此可知五支皆在一心而判為五支者例如十心數同時共起而有心王心數之異今支雖同在一心何妨有五支又橫論一心具五竪論取五相成就故言五支譬如貧人初開寶藏寶藏豁然即覺藏開當此藏開覺之時具魔樂等令開覺造初最強故受覺名次分別七寶是金是銀等而受觀名此觀亦有覺而觀義顯後受覺名分別知已即論於喜喜有昔所不得而今得之歡喜少歇而受快樂喜樂乃但喜強未顯後樂強而喜不動涌受於樂名喜樂既足即入一心定體如人食飽不須更食又如疲極欲眠不緣五欲即是一心支但動觸中有十功德五支成就其相如此餘七觸亦具十功五支之相也但數陌乃同而相貌各異譬如人熱中過冷水初頭極快後更得一甘泉復異於前復更以沙糖石密冷和水其味復異又得冷征魚味復異冷食雖同味味殊別又如寒時遇火甚以為快復得熱時食復以為快熱羮熱曤熱酒等種種熱食熱食乃同味味各異今八觸十功五支亦復如是各各相貌唯應證者曉了分明舉譬如上得和大較但進分八觸有橫發竪發竪發者若發一動觸究竟成滿五支具足後時若坐斂念即入或有難入若還發動觸五支成就雖同是動觸動觸轉深十功德亦倍上法禪有多品品品有異橫進者若發動觸十功五支已若謝若未謝即發冷觸十功五支若謝未謝復發餘觸者是名橫發或頓橫竪發可知若一觸不定如此餘例爾問未到亦有空與八觸空同耶答大概為九品其實無量如凡夫諸比丘目連身子佛皆得九品定而不知上驗欲界定淺初禪為深問初禪八觸五支二禪何意一識答初禪色麁是言語法故有八觸分張隔別之異若入二禪時呵覺觀受內淨喜樂轉妙故品在一識不得分張他解五支在欲界定第九品中而明覺觀或言在欲界定前今言若前若後皆不然何以故初禪名覺觀俱禪那得在欲界耶問何意坐禪人有見相不見相答譬如人好夢不好夢攀為多好夢相象鈍則昏熟不夢坐禪人想心多取假名則喜於靜心與相相應若想心不利雖坐不見相云云問若五支同在一心中者八觸止在一心不答八觸是四大法水火相違故不得一時次明八觸邪正者正如前説邪今當辨何故根本即須簡邪根本禪亦名外論禪如水普潤一切種子如前現者是善種子定潤則發若過若不及等邪種子於禪亦發觸中有定此是定種空是慧種明是通種喜是悅樂種如是等善法種悉在禪中故言根本論云如囊中有寶不探現人人無見者即此義也又亦是惡種者如空太過是惡取空種明太過即是一切邪通之種如是等九十六種道並以此為種為本細搜道理皆約過不及以判其種為是義故須約八觸以明邪正又觸亦在欲界定中何以故譬如服昌蒲將欲得力而瞋大盛服黃精將得力而欲更與非藥如此麁法被推將盡故莊今發觸亦爾色界淨色將起故界色身自起動觸觸亦冷暖等而無空明五支此則易判是非今但通就諸觸簡邪正即為三一約報鄣二約煩惱鄣三約魔事云何報鄣若有觸起能治身中病病除身安身安則道隆於禪有益此是報觸起若觸起為病病則妨禪不得修定此惡報起為壞禪觸也故成論云有風能成雨有風能壞雨有覺能成禪壞禪即此義也論人云善巧覺觀成禪不善覺觀壞禪此乃以四支為方便作如此説耳數人正取此為支故覺觀不壞禪釋論亦然今明報鄣觸不同二論所諍方便與正成禪壞禪之意但是欲界報身有觸致身損益故於禪有成壞耳未是初禪中事云云第二約煩惱明邪相者若此觸起已五蓋等強盛此是增煩惱觸若此觸起已五蓋除者此是除蓋觸若除事鄣五蓋此是欲界定觸若除欲界五蓋性欲界繫得繩除此是初禪觸問事鄣除是伏性鄣除是斷者有頂禪那得還生欲耶答譬如瘧病雖間日不發後日即發間日譬伏事善得善譬斷性雖復得差非是永斷明平復瘧世智斷性鄣非無漏斷雖生有頂還墮三途如平明復瘧也故大經云世醫所療治雖差已復生即此義也第三魔邪者此約初禪十功五支明若過若不及隨二邊有增減之失名之為邪若明過則見日月晃朗或復生於空解若暗證之禪明慧空解生時但明此空法而不能廣明法相若帶觀發觸明過生觸解則世智辨聰此師利使之相也當一一歷若過若不及廣明邪相如文問初禪那得有邪惡答惡入禪中禪體非惡惡入禪中能發成一切惡種子為諸惡之本又是邊境故身在欲界故故令邪惡得入又帶欲界心入禪故惡得入如人開門戶賊隨而進以欲界心中先有此邪氣分是故來入若初禪不覺此二十種者但有一種即能壞禪如二十人伴一人是賊十九俱罪若能於初禪覺識洮練邪惡既滅進二禪中無復邪惡之失也復次十功五支終是二十三心數略撮要者為五更細分別為十功德廣論是二十三心數例如陰入界開合云云今覺觀還欲覺觀發喜是受數樂是猗喜生樂還是受數一心是王故知終是心數中法也今十種功德中空是相數何故爾欲界想麁相見森森之存初禪想妙見有是空如雲如影故明者只是作意於境界界分明了所緣處的的不亂不暗也濡心自在只是念數念數持憶不失出入自在定即定數喜樂即受數解脫即解脫數善心即行行即思數慧即慧數境界相應即是作意於境數禪既是善但取通十大地心數取善心數除煩惱心數但約二十三心數以明廣略耳若欣同者為作心數名説若欣異者為作五支十功之名以赴前人之欲豈可聞其名異而生諍競云云若進入二禪者呵初禪覺觀為患惱亂禪心初禪即謝二禪即發云何呵厭如禪經云如人大極時欲眠若有喚呼聲其心大惱亂云何喚呼初禪有八觸等法若於一動觸發即有十種功德五支之法乃至九品進入即是竪喚呼若橫發諸禪即是橫喚呼一動觸如此餘觸亦如是功德既廣觀心緣之亦多喜樂動心紛紜重疊以之為惱得入一心安隱為快譬如人受五欲疲極方欲眠寢而賓容復來絃管又奏乃是娛耳歡心而欲眠為惱今初禪以覺觀為妨三心樂以之為惱若最初發觸生覺觀此為成一心次一品覺觀起能妨前一心橫亦如此品品互相成壞今呵此覺觀覺觀謝喜樂一心亦隨謝是故初禪名覺觀俱禪通體別體即此意也覺觀謝已即入中間單靜轉寂名退禪地如前分別又入未到更增一單靜空炅然安隱此即入海見於平相發是相已豁發二禪其心內淨炅炅如明淨鏡逾於從來此是二禪內淨發問二禪是色法云何言心內淨答以其發得四大淨妙之色勝於初禪之色以此相故照心即明故言內淨此淨與喜樂一心俱發故名喜俱禪淨是色淨發此淨故心喜猗喜生樂樂息入一心是為四支若是初禪四大未妙水大有別致有八觸橫竪等相不名一識若入二禪四大和融妙而且淨無復八觸四大之異但言一識處初禪由覺觀故喜為麁二禪以內淨故喜故為深妙此禪但有竪進無八觸橫進不妨更有餘禪及無漏之橫是名進發二禪之相若進登三禪者此二禪雖善而有喜涌之過喜即對憂故通憂隨心至有頂何處不有別則在欲界而初禪已斷此二禪斷憂而生喜喜對憂而生猶為喜心可動喜失則憂明識二禪過患則進發中間至未到單靜次發於樂此樂是色界淨色最極之樂前禪猗他生樂為粗此禪不猗他生遍身受樂凡夫捨此為難聖人得能捨知此是因緣生法無定凡夫染愛貪味故須捨支次念支慧支慧支是善巧防護此樂但經論出處不同或前捨或前慧此禪難故故交加前後支相不同當知為緣各異云云此禪乃是樂俱而樂壞則苦故論云喜樂雖是善而有憂苦患薄識過惡則進發四禪中間未到即發不苦不樂支亦名捨俱禪亦名不動支乃至定念捨等四支成就云云又此禪雖是不動安快而是色法患色如窂獄如疏如甑呵色緣空四禪即謝發中間未到即發空處空空廣心廣故言緣多即散爾時捨空緣識識多則散捨識緣無識或言少識一解云多識則散故緣少識則定一解云為緣識故為多今緣無識緣無法塵捨智緣無名為少識觀有識如壅廁無識如癡更有妙定名為非有想非無想非有則非有識非無則非少識雙非有無故言非想非非想凡夫謂為非想佛弟子知其無粗想亦有細想故佛呵須跋汝既除粗何不除細呵師不能何況於汝故知此定具細想煩惱約凡為無佛弟子為有合而名之名非有想非無想凡夫謂為涅槃佛弟子呵之出界云云問合中十七定俱是從淺至深不答中間定是退禪地定乃不深而位居於上又問若是定者俱有喜樂不答是邊地事悲心禪故無喜樂問無喜應無定答雖無事相應之別喜不妨有通喜進緣喜境之喜已伏事故有通喜樂未斷性故無別喜云云類始如四空依大集亦有通五支而無別異之支林此但通喜無別喜也復次橫進者如四卷禪內廣辨十五種禪橫發相不重出橫竪俱發者義則可解云云進分相如上次明達分者達名為道故道諦四行云道正行達亦云道如迹乘故達只是道以其識達四禪十二緣第一義之理稱之為達達有五義所謂退達護達住達進達達達退達者如人得未到定即退還發電光見理見理之慧得通而未到有失是名退達諸論解退義不同數明苦忍佛教不退爾前有退成論明四念處已不退何況忍法若云不退者真明發時一受不退分寂然見諦解起名真不退此復二解數人云見諦無漏不退思惟無漏有退故有退法羅漢沙井之喻成論人云思惟無漏豈容有退但是退分根性人今得無漏仍本立名稱為退法人實非退也如此等種種解退義云云護達者本是護分人由護故達也住達者亦如是進達者或入初禪二禪等因進故達達達者第十六心見諦解起已成初果而復更達二果三果乃至超成無學是為達達此是約三藏論達達也若別教者達生死涅槃不二即事而真名之為達此理轉明名為達達達分既有五義餘四分亦如是退分五者若得初禪退未到又退欲界至散心起五逆等是為退退本是退分人今雖如護亦退故名護退住此定人得已而失是名住退進發諸禪已而失故名進退十六心達理要因於定而無漏不失所因之定失故名達退護分亦具五義退分人而今決須防護良由過去不護不得成住分今若不護護分不成是故雖退要須護之故言退護退護者是護分根性今又加護故名護護住護者雖得住猶須護之是名住護進護者雖住進一禪亦須方便修於觀法是名進護達護者因此護故又如初果見理未得諸禪須方便修習亦名達護也住分亦為五如人得未到地久久而失還住欲界定是名退住但護得住是名護住常在一種品定是名為住雖進上定已復還住向定故故云住住進發上禪處處而住故言進住因住得無漏見諦名為達只住此定七返生不更發禪是名達住進分亦為五義進得初禪退還未到復更進破上地是名進退雖有此進恆得防護故名護進在一種定久久而進是名住進次第進無間者名為進進以進故得無漏是名達進亦是發無漏已能橫竪發禪故言達進如是五種之義分各各為五是猶為略若更廣明只歷十二門禪禪禪之中皆具五分又歷一切禪亦各各備五分例此可解云云復次五分又各有兩種一者任運退二者內外因緣故退任運護善巧防持故護餘例有此義云云若任運達者此所不論若善巧修達者今當分別則為二先簡邪二明修觀邪者凡有四種有人無觀慧但暗心調和氣息數一至十心既靜細證得欲界或發未到仍發宿習之見或一切皆有自性神我之法住在身中執此為實計為涅槃究竟之道能問能答非他是已見心深入不可移轉此乃有見之法妄謂為達實非達也次有人如是數息證未到定發宿習謂一切法空無所有云何等相性無毫末許法豁若虗空神解異人辨使無滯竪執所見謂為涅槃撥他是己空見深入佛所不化此妄謂為達實非達也次發亦有亦無見次發非有非無見於如是皆妄謂為達實非達也如長爪思惟諸法不見性相不可破壞如大海水不得一法入心如此之見並非深入定見若非見者云何如來一言破之即墮二負處識其見心知是苦習獲法眼淨若如此者何得稱之為達耶又如論力梵志受雇撰五百明難最初一問佛云為一究竟道衆多究竟道若一諸師各各稱若多理不應爾于時鹿頭歸伏在佛後扇佛指之曰汝識此人不答曰識佛云此人得究竟道耶答云最為第一佛言若爾何故扇耶於是心伏五百之難從風自靡當知衆多究竟道乃是諸見妄謂何關於達何以故凡夫外道有見論愛論自讚毀他不知自撿常起苦集而不覺知故言外道愛著觀空智慧故不能發真是名暗心修禪而發宿習任運成見名為邪也次明修觀邪者有人初學一種解心謂言諸法若有若無等四句是實執此為解決定喜以此為入觀方便因是證定定心既靜諸見轉明堅執不可捨我慢自矜高但知破他之非不嘗覺識心內煩惱靜見決定是謂為達實非是達是為四種邪就發見有兩一但發見心辨説見心通達説見無盡而不得五通一加得五通停河在耳變鹵化羊刀割香塗有如無念世謂為一切智人然通非無漏而見慧生著著是習習故苦終為四聖諦所破乃可稱達但是發見獲通廣讀韋陀三種外道耳佛法以三稱解脫謂之云云問正道外道修空云何異答外道恚愛處生毒真空人不爾知愛恚從因緣生故不著不著故無愛恚愛恚息故名不生不生即是空空見人即救之云我愛恚者是思惟惑何關空理無學亦有習何得以此妨空又破之即有四句料簡汝所起者乃是新病更起那得例同聖人聖人故病即是思惑六十二見滅即是不起新病汝以世智強伏故病故病不發而於見心更起新病順汝見則愛違汝見則嗔此二從癡生陵他為慢具足八十八乃至八萬四千苦習浩然那得稱是思惟例同聖人此為大謬料簡四句如止觀云云問何因能忍故病復起新病答外道亦具邪行聞思修邪三慧以其邪心推盡不見現既未發真妄即為是違順其所是法故新病發興以其有修慧故涉事而行忍力得成強作平等佛法亦具正三慧以正道方便智慧撿見不起故新病不生無修慧故故病猶在云云第二明修達觀者為二初明達分之觀二約信法兩行明觀法之相事如四念處中所明往彼尋之也二明兩行者為二即信法兩行也信憑聞而解法藉思乃生法行非都不聞聞少思多聞多思少云云但判兩行之位正在苦忍以聞即入判為信行以思即入判為法行今解遠取根性初之元起若多發學問為信行根性多有禪寂為法行根性世世研修故苦忍之位判其兩別而得悟道但此兩行不可令偏至如法行之人三乘之初不愚於法識解有無等相邪正悉知若無定者如風中燈照物不了若無定名狂智慧顛智慧如惡馬而不群雖有觀慧不名達也又初心不識法相不解道理暗心修禪停心數息設令證未到等禪與愚夫禪不異此名為癡亦非停心念處之觀既非念處不名似達賢人之位如世間稱賢者能知天文地理百家俱達然後立德修行仁慈謙讓解行具足稱之曰賢直爾質朴徒讓是愚直爾懷解唐突造過復是顛狂解行既偏不稱賢士具足兼舉號之曰賢修道人亦如是單解稱非有非無稱為愚癡論何況上三句何故爾癡是無明汝於四句不識四諦苦習十二因緣諸流諸縛但用是見法非他之法而起生死是事不知名為無明無明即癡所以者何非有非無之法絶四句百非湛然清淨汝若證此法者言行相應此法治心平等無滯何得依止此見是己毀他是非既生有無之心即起雙非安在若人讚之則喜違之則恚謂已解忽他為慢於此不了是癡今雖無疑後當大疑是為五鈍宛然又復謂此是道行是道故能有所證即是戒取的謂此見為是是事定餘妄語豈非見取執此法邊不取餘法邊是為邊見此見偏僻不當道理是名為邪見是見依色是身見如是則五利使具足此十使約三世具有八十八使云云此見依色即色陰受此見即三苦是受陰想此見像貌為此起善惡行了別此見即是五陰受即是苦想行即是有生死見愛流轉浩然真是不識非有非無之過豈非愚癡論非有非無見生過既爾餘三句過一一具此四諦十二緣利鈍等使以不識此過故皆稱為癡雖作如是見心心解以不得定故名為狂顛名為外道邪僻不名三乘之初不愚於法正解之人問佛弟子尋教作此念處何意不成賢人答一觀無常法不遍二無七覺調適定慧將息三於觀空智慧生染為是故不成今正解人天者洞識法相於四見中一皆識四諦十二緣苦集五陰隨心起處有見生時即識即撿四念處破於四倒窮核心路不令一念取著故言外道是生煩惱處佛法是滅煩惱處如此解時名有為法中得正憶念三乘之初不愚於法隨有此解亦未解賢能以念處之觀破六十二見之倒斂心修定調和氣息繫念修禪能發未到之定以定力故解心轉明有定之慧不名顛有慧之定不名癡解行既足方稱為定得定故觀心專的定所分明名為念處亦是用數治亂用慈治瞋等五方便觀分明故名停心若都無解直爾暗心心何由停故請觀音云眼與色相應云何攝住身子答云地大地無堅相如是皆入如實之際達此觀心方能攝住攝住故名為停心當知念處停心洞達五陰不淨存無常等總相別相觀慧明了爾時名相似遠是初賢之位若不得念處者𤏙法不生不得𤏙乃至亦不得初果念處成故則生𤏙乃至成無學是名法行人也次明信行人若自思惟了然不解憑他為説方能得悟譬如天數數雨五穀數數熟以聞法故即了邪正無愛無迷深識法見四諦十二緣心無依猗能破諸倒成就念處相似之道一一如上説但有從他聞為異耳若作如此等信行法行兩種之修是有為法中得正憶念決定能發真似之道然達本遠理達何等理凡有四種論達即四教也若三藏論達復有四門有門作停心念處觀色是不淨無常苦乃至心亦如是是名有門判賢聖真似具如阿毗曇若空門念處觀色是三假因成等浮虗不實於衆生中亦作三假不定於定成生法二聖行故阿含云是老死誰老死二俱虗妄以是觀行得成賢聖真似之道也此如成論所明亦有亦無門觀五陰因緣所生故是有緣生浮虗不定是空以是為觀聖賢真似之道也此如昆勒所明非空非有門觀義推應有如大論云一切實等廣説第一義第一義即是悟理悟理從四門入即是有無等四門之義也又大論云為車匿心調當説離有無經可得道此即非有非無門得羅漢不可以此非有非無為大乘中道意也又成論明離有離無行聖中道尋此語只是離斷常之有無指偏真為中道寄濫大乘也以不辨佛性不空涅槃只是三藏四門此門通行者見真理也問既破六十二見之有無那忽以更四門被物豈不還成有無耶答以有無諸見有礙不能得出離滅道今將真法破其見心絶諸有無百非四句皆遣於諸見中無復住著是則無復四執之性今四悉檀意赴機利物假作四門説令得悟解若不破性實之法不名為假説已破性無性實四門假施四門以逗於物物既得悟亦無四門之可存也故大智論云佛向道人聞説即悟終不執門為見同於有無等執也三藏中論支佛人亦如是一則觀無明老死無常生滅念念不住以入真二則觀無明行業因緣相續相待是老死誰老死生法二修浮虗悟入空平等餘二門觀相可知通教明道者還同用無生滅觀門入道稱之為道昔為鈍根今為利根上推四微折之令空唯不破鄰虗空門拆此三假虗塵平等而入二論因是推拆令空譬如實柱若燒若破令此柱無此是實空有是為滅色拆空也通教不爾觀五陰等諸法雖復四微所成若假實皆如幻化故大品云色如幻化乃至識如幻化十喻之意正在於此故鏡像幻人若有若無無不定無有不定有體知本自不生今亦如滅雖復幻化森羅萬像之有即此幻有是無不須得其滅已方知是無何以故若異於色可復滅色取空今色即是空故不須滅色故即色是空也即有是無此無非定無何以故幻無何得定無即此是有不須離此無而明有譬如明鏡內淨空而現種種之色即此空是色不可異於此空而辨色故大品云即色是空非色滅空空即是色色即是空故名體法入空不同拆法之觀也以根利故覺色即知如幻等十喻若於色生見心即知此心不自不他不共不無因乃至受想行識等諸塵對心生亦不共不無因等四句檢於生無有生檢無生無有生撿亦生亦無生無有生撿非生非無生無有生具如止觀云云即是通教觀法也中論人云由滅故生用此為假向者由生故生既是自生而被破今由滅生豈非他生而不破云此為假生者此是他生問尚未被破性義未除云何為假今破四性義後以四悉檀赴機立假也通教亦四門幻有幻無等以此四門赴利根引入此四門融妙但有名字不可定執但此教正為菩薩傍入二乘故經云欲得聲聞支佛乘者當學般若般若即指大品而大品有共不共今當料簡自有共般若共二乘説即是大品又有共般若不共二乘説即是大品教未與時但用三藏逗諸聲聞聲聞爾時不聞通教自有不共般若共聲聞説即是大品命轉教自有不共般若不共二乘説如華嚴二乘如聾啞問那不共那得同説答即雖不共為作由藉令至法華得共如客作人於長者財乃非己分而令領知為後時付家業作梯漸故也今一一往體如幻之色觀法虗玄今更約自生他生以曉行者且數息論之能安之心及所數之息皆如鏡像雖有頭等六分頭等六分而不可得即此六分悉是虗無雖是虗無不可以頭為足世諦道亂也即無而有故能數所數俱是幻化不妨有一至十能數所數之法猶計此為有不能體達虗無以為無生者即當以三假往撿但是如幻之法塵對如幻之意根生如幻之意識則有如幻從一至十之數者為當從幻塵生為當從幻意生意生即自生塵即他生乃至共無因等若有四生者即有四性有四性故即是空有何名為假亦不成幻以四句往撿不得四種之生即是無性無性生故即是假生假生非生是為性空性空故即是無生若言四句撿不得性生而猶執假生者今明假生本得性體而立今既無自性亦無自性之假名無他性體亦無他性之假名故大品云是字不在內即不自生不在外即不他不在中間即不共亦不常自有即不無因是字不住不住四性中亦不不住亦不在無生無性之中是故此字無所依猗以不可得故但有名字名字亦空以名字空故亦不執是假以假名不可得故名為相空相空故即是真諦空性空故即是俗諦空以真俗性相空故名為無生此即是四句撿幻化因成假觀門也若謂無因成之法者此即是無法塵對意根生此無塵之計還以四句撿之第一雖作如此不得生相猶謂有如幻念念相續從一至十如幻之數即作相續假撿之若如幻之心前念不滅而後念續生此是生生以前念不滅而生即為並生如母生子若前念滅後念生即是他生若前念亦滅亦不滅後念生即是共生若離前念滅不滅而生即是無因生今以四句撿相續之生不可得即是無四種性生即是性空性空是空俗無性而説為無生但是假名名字字無所依猗不內不外不中間不自有不住不不住名字不可得故即是相空相空是空真真俗之空本無一念之有何得有前念續後念耶當知但假名字説名字亦空此是撿相續假入無生也若謂相續不可得而執無相續者此亦是無塵對意生心耳還撿此無相續也云云第三雖復撿相續相性不可得然猶計此無生之心必有待藉若本無生今何言生而須撿破此是無生當知此無生是待生得無生之名就此即為相待四句撿之若數息之心生待無生名生者即是他生待生者即是自生共無因等云云若有所待還成性等何謂無生四句撿待不可得即而無待性無性但假此假名不住亦不住云云若此三假四句撿幻生不可得名為伏惑真明發時名斷惑若三藏柝定色令盡名伏真發為斷今觀不論除盡但體知而已無性無相因是發真成通教達也問若四句皆是性云何更立四句之教所以者何如阿毗曇見有極微之色不破由是得道豈非有性成論三假觀生法皆空拆於極微令空由是得道豈非空性昆勒雙教車匿雙離云云若大乘明阿黎耶識自性清淨心額珠寶藏即是本有大涅槃空迦毗城空智者見空及與不空佛性亦色非色中道實相遮於二邊佛性不空不有如是等亦是四句豈非約此為教若離更無所説別説只在此四將不是性耶答若計有四句之實執此為是此是性義是故須破若不破性而言四句者此是性定何得稱假名今聖人正觀之智破除四執無四性可存前人應以四句得度即以四句施教無自故假施於自無他性故假施於他等云云故大論云若有見取四句皆不見第一義若無四性以四悉檀假説無咎云云通教亦有緣覺從四門入故大品云習應無明空乃至老死空無明即空空即無明體無明既是空是為緣覺道理之觀云云若別教四門達觀相者若圓教四門達觀相備如止觀所明十種境界此中應廣明是為於根本禪中發五分禪略辨如此云云復次發特勝善根者若初禪根本暗心數息證欲界定謂言無身如虗空相如老人穿針謂針無目若特勝發初禪時還於身中而覺八觸覺觀喜樂如年少眼諦還見針眼若將初禪特勝禪亦復如是何故爾數時暗數證時暗證特勝時緣息出入長短遍身乃至除捨棄滅等若發欲界已知長短遍身今發初禪明見三十六物大腸小腸而見食若穀粟是麻是豆了了分明即是特勝發也或經得初禪已而發特勝者約明暗可知若未得初禪而發此有特勝不單發要憑根本一時共地所有五支乃是覺於三十六物觀此三十六物喜今始見入而生於樂以一心如是五支不比前也如水和沙糖石蜜氣味沉重證者自知云云例前亦應有五支之義類作云云發通明禪相者既三事通觀所發亦異特勝是總通明為別若初觀三事已覺三事通同無礙或可至欲界空中覺三事通同若本得初禪今發此相自知事別若未得初禪今發此定要附根本同發即備五支如大集所明其相大異覺支者如心覺大覺思惟大思惟如心者如即無空也於欲界定中不見身心相名為如心覺大覺者似於無漏氣分殆如理空故言大覺後去思大思行遍行亦如是非但覺身內皮內亦覺外間五行山河等法亦覺無漏慧行故言遍行大行事在別卷云云餘一切禪亦應分別今不委論云云復次三止非但發諸禪證亦發諸禪那如於欲定忽覺氣息長短毛孔虗疏即是發特勝修義餘修例爾若未經證初禪而發諸法者終以根本為本法如數人同謂修義證者一時證根本及諸禪也若暗證者不別其相知法者及尋經論識相宛然五支悉異云云釋驗虗實者虗則是邪實則是正邪是偏邪為義正是從客不墮二邊若世間禪者亦有邪心若過若不及二十種名邪無此名正若出世間亦有邪正以前世間之正皆名為邪墮在常見有為法故所以名邪見第一義名之為正若出世上上禪亦有邪正世與出世墮在二邊名之為邪得入中道名之為正問無漏已去不應為魔所嬈答大品云魔雖不嬈令還三界亦嬈令失中道復次若有方便發得正禪正禪處復增長設發邪法即能以正法治之令終還正即於邪中具於一切法邪有四緣所生亦空亦假亦中非唯能使邪禪成正後廣通諸法若無巧方便止能即驗之此但能却邪定顯正定不能於中道具足一切佛法也復次發觸有若過若不及者覺已除遣若久久不遣即能破壞於禪或致狂悸悸諸病假令不成於病此人所為所作諸行漸當破壞何故爾禪是功德藂林能周正人身口資成戒行豈有習禪人身口戒行雜亂當知是因觸邪僻故爾云云問發四禪皆得有不答魑魅魍魎處處皆有而初禪鄰欲界過患最多故九十六道唯三道是正餘悉是邪四禪安免邪也譬如少男少女常思念欲事纏綿在心故精媚所著行人亦如是若邪念思想行其邪道念其法邪即得入而狂亂失心者壞禪云云今欲分判九十三種相貌依彼經中自説諸道之相來約行者心中所證邪法若相應者即是其道也如是一一配奠令使分明須識邪假自能嚴防亦使他人警覺又若以九十三相來驗心但識邪名不識心法是名有聞無慧但識邪心不識名此是有慧無聞若名法兼俱心瞻周正假令發如此等者必能遣却也此中應廣出證邪定之人為證云云又約一動觸判邪正相餘不出者如五部律種種解釋假有一事非律所載亦引例為解大乘義若無文亦引例為釋令禪門無量邪正不一但深得初禪觸中邪正之意例通一切無往不去故書云詩三百一言已蔽諸所云思無邪也假令上風正治之能下判邪倒之失只是一無邪耳故瑞應云得一心者萬邪滅矣能如此善識真偽魔事萬端悉皆滅矣正有二一世正見即是因果之道如世王治法大經云牛中牛相馬中馬相不相混濫是名世間正見若出世者何者是牛牛無牛相無牛而計有牛即是倒惑非出世正見今撿牛無牛相馬無馬相故非顛倒則是出世正見破六十二見生空生空既去法空又遣念非正見也今次第禪門從淺至深明世間正見次明出世正見故百論云福能去非空能去福即此義也又十種正法互相資成若不爾者則非正定如十人同心去相來辨又根本禪雖無二十邪而發餘禪有一邪非但壞餘禪亦壞根本云云若初發根本有邪更發餘禪餘禪但有正相而根本邪相亦自退失邪不干正如福德人住處少鬼遠去云云將此發宿習之意廣歷信行發四種不同後歷法行四種不同又魔三乘人各有須行云云約此判賢聖位如此翻轉出生百千萬種不可窮盡只約一人或坐不悟因師即悟或暗即悟因坐而悟如是不同將此望如來放光聖説聖默為緣差異後應何量又復修事發無漏名發無漏者或但有退分習或但守分住進達今便發而昔於一種事禪但作事修是故今但發於事若昔約事中而緣真者今修道時於修法中少許因緣即發無漏也
